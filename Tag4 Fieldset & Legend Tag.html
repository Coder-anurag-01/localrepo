<!DOCTYPE html>
<html>
    <head>
        <title>Form</title>
    </head>

    <body>
        <form>


            <fieldset>    <!--form tag ko group karna ka liya ya boundry karna ka liya fieldset ka use hota hai.-->
              <legend>User Form</legend> <!--form tag ka group ko naam dena ka liya legend tag lagata hai.-->
             
                <label for="name">NAME:</label>
              <input type="text" id="name" placeholder="Enter a name"><br><br>   <!--input field-->
              <label for="name">Email:</label>
              <input type="Email" id="name" placeholder="Enter a email"><br><br> <!--input field-->
              <label for="name">Password:</label>
              <input type="password" id="name" placeholder="enter a password">  <!--input field-->
              <br><br><br>
              <input type="submit">
            </fieldset>


        </form>
    </body>
</html>
