<!DOCTYPE html>
<html>
    <head>
        <title>User Registration Form</title>
    </head>

    <body>

        <h2>User Registration Form</h2>

        <fieldset>

            <legend>Registration</legend>

            <label for="name">Name:</label>
            <input type="text" placeholder="Enter a name" id="name"><br><br>

            <label for="email">Email:</label>
            <input type="email" placeholder="Enter a email" id="email"><br><br>

            <label for="password">Password:</label>
            <input type="password" placeholder="Enter a password" id="password"><br><br>

            <label for="address">Address:</label>
            <textarea id="address" placeholder="Enter a address"  ></textarea><br><br><br>


            <label>Gender:</label>

            <input type="radio">Male
            <input type="radio">Female<br><br><br>

            
            <input type="submit">


        </fieldset>

    </body>

</html>
