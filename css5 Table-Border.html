<!DOCTYPE html>
<html>
    <head>
        <title>second lecture</title>
        <style>
            table{
                border-collapse: collapse; /*table par line lagane or lines ko milane ka liya collapse ka use kiya hai.*/

            }
            tr,th,td{
                border:2px solid red;
            }
        </style>

    </head>
    <body>
        <table>
            <tr><th>Sr. No</th><th>Name</th><th>Class</th></tr> <!--tr means table row, th means table head-->
            <tr><td>1</td><td>Anurag</td><td>7</td></tr><!--tr means table row, td means table data-->
            <tr><td>2</td><td>Aditya</td><td>9</td></tr><!--tr means table row, td means table data-->
            <tr><td>3</td><td>Ansh</td><td>5</td></tr><!--tr means table row, td means table data-->
        </table>

    </body>

</html>
