<!DOCTYPE html>
<html>

    <head>

        <title>CSS5</title>

        <style>

            #one{
                border-style: dotted;
            }
            #two{
                border-style: dashed;
            }
            #three{
                border-style: solid;
            }
            #four{
                border-style: double;
                border-color: blueviolet;
            }
            #five{
                border-style: groove;
                border-width: 50px;
                
            }
            #six{
                border-style: inset;
                border-radius: 50px;
            }
            #seven{
                border-style: outset;
                border-color: blueviolet;
                border-width: 10px;
                border-radius: 50px;
                
            }
            #eight{
                border-style: ridge;
            }

            #nine{
                border: 2px solid blue ;  /*shortcut ma property likna ka tarika*/
            }    

        </style>

    </head>

    <body>

        <p id="one">Border 1</p>
        <p id="two">Border 2</p>
        <p id="three">Border 3</p>
        <p id="four">Border 4</p>
        <p id="five">Border 5</p>
        <p id="six">Border 6</p>
        <p id="seven">Border 7</p>
        <p id="eight"> Border 8</p>
        <P id="nine">Border</P>

    </body>





</html>
