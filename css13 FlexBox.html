<!DOCTYPE html>
<html>

<head>

<title>FlexBox</title>

<style>
    .container{
        display: flex;
        background-color: gray;
        flex-wrap: wrap;  /*words ko next line ma set karta hai agar jagha nhi ho tho*/
    }

    .container div{
        background-color: white;
        color: black; /*font color*/
        text-align: center;  /*box ka ander ka words ko center ma karne ka liya*/
        width: 200px;
        padding: 20px;
        margin: 20px;
   }
</style>

</head>

<body>

<div class="container">
    <div>1</div><div>2</div><div>3</div>
    <div>4</div><div>5</div><div>6</div>
</div>

</body>

</html>
