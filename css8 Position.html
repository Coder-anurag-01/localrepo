<!DOCTYPE html>
<html>

    <head>

      <title>CSS8</title>

       <style>
            /*img{
               position: relative;
               left: 100px;
               top: 100px;
               width: 100px;
            }*/
              .anurag{
               position: relative;
               left: 100px;
               top: 100px;
               width: 100px;
             }    

              img{
               position: absolute;
               left: 100px;
               top: 100px;
               width: 100px;
              }
        </style>

    </head>

    <body>
        <!--<img src="background image.jpg"--> <!--single tag ma relative use kar sakte hai.-->

       <div class=".anurag"> <!--parent tag--><!--sabsa upar jo tag hoga usa parent tag bolage abhi div parent tag hai or div ka andar hai vo child tag hai.-->
        <P>Coding Seekho</P>  <!--child tag ko parent tag sa relation dena ka liya absolute ka use karte hai style ma.-->
       <img src="background image.jpg"> <!--child tag-->
       </div>
    </body>

</html>
