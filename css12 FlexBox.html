<!DOCTYPE html>
<html>

<head>

<title>FlexBox</title>

<style>
    .container{
        display: flex;
        background-color: gray;
        flex-direction: row; /*row, row-reverse, column, column-reverse*/
    }

    .container div{
        background-color: white;
        color: black; /*font color*/
        padding: 20px;
        margin: 20px;
   }
</style>

</head>

<body>

<div class="container">
    <div>one</div>
    <div>Two</div>
    <div>Three</div>
</div>



</body>

</html>
