<!DOCTYPE html>
<html>

    <head>
        <title>User Registration Form</title>

        <link rel="stylesheet" href="css6.css">

        <style>

            #border{
                border-style:solid;
                border-color:rgb(60, 124, 124);
            }

            #name{
                border-style:solid;
                border-radius: 50px;
                border-color:rgb(60, 124, 124);

            }

             #email{
                border-style:solid;
                border-radius: 50px;
                border-color:rgb(60, 124, 124);
            }

             #password{
                border-style:solid;
                border-radius: 50px;
                border-color:rgb(60, 124, 124);
            }

              #address{
                border-style:solid;
                border-radius: 50px;
                border-color:rgb(60, 124, 124);
            }


            #state{
                border-style:solid;
                border-radius: 50px;
                border-color:rgb(60, 124, 124);
            }

            #city{
                border-style:solid;
                border-radius: 50px;
                border-color:rgb(60, 124, 124);
            }


        </style>

    </head>

    <body>

        <h1>User Registration Form</h1>

        <fieldset id="border">

            <legend>Registration</legend>

            <label for="name">Name:</label>
            <input type="text" placeholder="Enter a name" id="name"><br><br>

            <label for="email">Email:</label>
            <input type="email" placeholder="Enter a email" id="email"><br><br>

            <label for="password">Password:</label>
            <input type="password" placeholder="Enter a password" id="password"><br><br>

              <label for="address">Address:</label>
            <textarea id="address" placeholder="Enter a address"  ></textarea><br><br>

           


              <label>select state:</label>     <!--dropdown/ different option choise-->
            <select id="state">
                <option>select </option>
                <option>rajasthan</option>
                <option>haryana</option>
                <option>uttarpardesh</option>
                <option>panjab</option>
                <option>maharastra</option>
                <option>madhya pardesh</option>
                <option>delhi</option>
            </select>
            <br><br>

              <label>select city:</label>     <!--dropdown/ different option choise-->
            <select id="city">
                <option>select </option>
                <option>jaipur</option>
                <option>alwar</option>
                <option>faridabad</option>
                <option>palwal</option>
                <option>goa</option>
                <option>noida</option>
                <option>delhi</option>
            </select>
            <br><br>

             


            <label>Gender:</label>

            <input type="radio">Male
            <input type="radio">Female<br><br><br>


            
            <input type="submit">


        </fieldset>

    </body>

</html>
